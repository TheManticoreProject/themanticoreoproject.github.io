- name: "Delegations"
  description: "A tool to work with all types of Kerberos delegations (unconstrained, constrained, and resource-based constrained delegations) in Active Directory"
  longDescription: "The Delegations tool provides comprehensive capabilities for analyzing and working with Kerberos delegations in Active Directory environments. It supports all three types of delegations and helps security professionals identify potential attack vectors and misconfigurations."
  icon: "key"
  stars: 214
  category: "ad-kerberos"
  githubUrl: "https://github.com/TheManticoreProject/Delegations"
  features:
    - "Support for unconstrained delegations"
    - "Constrained delegation analysis"
    - "Resource-based constrained delegations"
    - "Cross-platform compatibility"
    - "Detailed reporting capabilities"

- name: "FindGPPPasswords"
