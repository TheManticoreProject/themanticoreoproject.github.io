{{ define "main" }}
<div class="container">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </div>
  <div class="grid-3" style="max-width: 72rem; margin: 0 auto;">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card card-hoverable" style="display: block;">
      <h3 style="font-weight: 700; margin-bottom: 0.5rem;">{{ .Title }}</h3>
      {{ with .Date }}<div class="blog-meta"><span>{{ .Format "January 2, 2006" }}</span></div>{{ end }}
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
