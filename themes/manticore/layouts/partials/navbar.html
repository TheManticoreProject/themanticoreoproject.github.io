<header class="navbar">
  <div class="container navbar-inner">
    <a href="{{ .Site.BaseURL }}" class="site-title">The Manticore Project</a>

    <button class="mobile-menu-btn" onclick="document.getElementById('nav-menu').classList.toggle('open')" aria-label="Toggle menu">
      {{ partial "icons.html" "menu" }}
    </button>

    <nav id="nav-menu">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <div class="navbar-actions">
      <a href="{{ .Site.Params.githubOrg }}" target="_blank" rel="noreferrer" class="icon-btn">
        {{ partial "icons.html" "github" }}
        <span class="sr-only">GitHub</span>
      </a>
      <a href="{{ .Site.Params.discord }}" target="_blank" rel="noreferrer" class="icon-btn">
        {{ partial "icons.html" "message-circle" }}
        <span class="sr-only">Discord</span>
      </a>
      <a href="/tools/" class="btn btn-primary btn-sm">Get Started</a>
    </div>
  </div>
</header>
